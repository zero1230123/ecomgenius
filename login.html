<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — EcomGenius</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
        --bg: #07070e; --surface: #0d0d16; --card: #111119;
        --border: #1c1c2e; --border-h: #2c2c44;
        --text: #f0f0fa; --muted: #8888a8; --dim: #55556a;
        --primary: #8b5cf6; --primary-l: #a78bfa;
        --cyan: #06b6d4; --green: #10b981;
        --g: linear-gradient(135deg, #8b5cf6, #06b6d4);
        --font: 'Inter', -apple-system, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }

    /* Background effects */
    .bg-glow { position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.12; pointer-events: none; }
    .bg-glow-1 { width: 500px; height: 500px; top: -150px; left: -100px; background: #8b5cf6; }
    .bg-glow-2 { width: 400px; height: 400px; bottom: -100px; right: -80px; background: #06b6d4; }

    /* Container */
    .login-container { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 20px; }

    /* Logo */
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo a { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
    .logo-icon { font-size: 2rem; }
    .logo-text { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; }

    /* Card */
    .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 36px 32px; }
    .login-card h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; text-align: center; }
    .login-subtitle { font-size: 0.88rem; color: var(--muted); text-align: center; margin-bottom: 28px; }

    /* Google button */
    .btn-google { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px 18px; border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: var(--text); font-family: var(--font); font-size: 0.92rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-google:hover { border-color: var(--border-h); background: rgba(255,255,255,0.06); transform: translateY(-1px); }
    .btn-google svg { width: 20px; height: 20px; }

    /* Divider */
    .divider { display: flex; align-items: center; gap: 14px; margin: 24px 0; }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: 0.78rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.05em; }

    /* Form */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    .form-input { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: var(--text); font-family: var(--font); font-size: 0.9rem; transition: border-color 0.2s; outline: none; }
    .form-input:focus { border-color: var(--primary); }
    .form-input::placeholder { color: var(--dim); }

    /* Submit */
    .btn-submit { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--g); color: #fff; font-family: var(--font); font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(139,92,246,0.3); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Error */
    .error-msg { display: none; padding: 10px 14px; border-radius: 8px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #f87171; font-size: 0.82rem; margin-bottom: 16px; text-align: center; }
    .error-msg.show { display: block; }

    /* Toggle */
    .login-toggle { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--muted); }
    .login-toggle a { color: var(--primary-l); font-weight: 600; cursor: pointer; text-decoration: none; }
    .login-toggle a:hover { text-decoration: underline; }

    /* Footer */
    .login-footer { text-align: center; margin-top: 20px; font-size: 0.78rem; color: var(--dim); }
    .login-footer a { color: var(--muted); text-decoration: none; }

    /* Loading spinner */
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) { .login-card { padding: 28px 20px; } }
    </style>
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="login-container">
        <div class="login-logo">
            <a href="index.html">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">EcomGenius</span>
            </a>
        </div>

        <div class="login-card">
            <h2 id="formTitle">Welcome Back</h2>
            <p class="login-subtitle" id="formSubtitle">Sign in to access your AI dashboard</p>

            <div class="error-msg" id="errorMsg"></div>

            <!-- Google Sign In -->
            <button class="btn-google" id="googleBtn">
                <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continue with Google
            </button>

            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">or</span>
                <div class="divider-line"></div>
            </div>

            <!-- Email Form -->
            <form id="emailForm">
                <div class="form-group" id="nameGroup" style="display:none;">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-input" id="nameInput" placeholder="Your name">
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="emailInput" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="passwordInput" placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">
                    <span id="btnText">Sign In</span>
                    <span id="btnLoader" style="display:none;"><span class="spinner"></span> Please wait...</span>
                </button>
            </form>

            <div class="login-toggle">
                <span id="toggleText">Don't have an account?</span>
                <a id="toggleLink" onclick="toggleMode()">Sign Up</a>
            </div>
        </div>

        <div class="login-footer">
            <a href="index.html">← Back to Home</a>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script>
    let isLogin = true;
    const $ = s => document.querySelector(s);

    function toggleMode() {
        isLogin = !isLogin;
        $('#formTitle').textContent = isLogin ? 'Welcome Back' : 'Create Account';
        $('#formSubtitle').textContent = isLogin ? 'Sign in to access your AI dashboard' : 'Start generating content for free';
        $('#btnText').textContent = isLogin ? 'Sign In' : 'Create Account';
        $('#toggleText').textContent = isLogin ? "Don't have an account?" : "Already have an account?";
        $('#toggleLink').textContent = isLogin ? 'Sign Up' : 'Sign In';
        $('#nameGroup').style.display = isLogin ? 'none' : '';
        hideError();
    }

    function showError(msg) {
        const el = $('#errorMsg');
        el.textContent = msg;
        el.classList.add('show');
    }
    function hideError() { $('#errorMsg').classList.remove('show'); }

    function setLoading(loading) {
        $('#submitBtn').disabled = loading;
        $('#googleBtn').disabled = loading;
        $('#btnText').style.display = loading ? 'none' : '';
        $('#btnLoader').style.display = loading ? '' : 'none';
    }

    // Check if already logged in
    firebase.auth().onAuthStateChanged(user => {
        if (user) window.location.href = 'dashboard.html';
    });

    // Google Sign In
    $('#googleBtn').addEventListener('click', async () => {
        hideError();
        setLoading(true);
        try {
            const provider = new firebase.auth.GoogleAuthProvider();
            await firebase.auth().signInWithPopup(provider);
            window.location.href = 'dashboard.html';
        } catch (err) {
            showError(err.message);
            setLoading(false);
        }
    });

    // Email Form
    $('#emailForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();
        setLoading(true);
        const email = $('#emailInput').value.trim();
        const password = $('#passwordInput').value;

        try {
            if (isLogin) {
                await firebase.auth().signInWithEmailAndPassword(email, password);
            } else {
                const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
                const name = $('#nameInput').value.trim();
                if (name) await cred.user.updateProfile({ displayName: name });
            }
            window.location.href = 'dashboard.html';
        } catch (err) {
            let msg = err.message;
            if (err.code === 'auth/user-not-found') msg = 'No account found with this email.';
            if (err.code === 'auth/wrong-password') msg = 'Incorrect password.';
            if (err.code === 'auth/email-already-in-use') msg = 'An account with this email already exists.';
            if (err.code === 'auth/weak-password') msg = 'Password must be at least 6 characters.';
            showError(msg);
            setLoading(false);
        }
    });
    </script>
</body>
</html>
